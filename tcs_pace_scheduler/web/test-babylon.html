<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Babylon.js</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="device-viewer.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            overflow: hidden;
        }
        #renderCanvas {
            width: 100%;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        console.log('Testing Babylon.js...');
        console.log('BABYLON available:', typeof BABYLON !== 'undefined');
        console.log('DeviceViewer available:', typeof DeviceViewer !== 'undefined');

        if (typeof DeviceViewer !== 'undefined') {
            try {
                const viewer = new DeviceViewer({
                    canvasId: 'renderCanvas',
                    deviceType: 'phone',
                    entranceAnimation: 'spiral',
                    loopAnimation: 'float',
                    brightness: 1.4,
                    logoUrl: 'assets/Tata_logo.svg',
                    enableGlow: true,
                    defaultVideoPath: 'assets/videos/phone-video.mp4',
                });
                console.log('✅ DeviceViewer created:', viewer);
            } catch (e) {
                console.error('❌ Error creating DeviceViewer:', e);
            }
        } else {
            console.error('❌ DeviceViewer class not found!');
        }
    </script>
</body>
</html>
