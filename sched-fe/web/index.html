  <style>
    /* Brand Fonts - loaded via Flutter */
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      /* Fonts will be loaded by Flutter from pubspec.yaml */
    }

    /* Web Splash Screen - shown while Flutter loads */
    #web-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.5s ease-out;
      overflow: hidden;
    }

    #web-splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Pace Logo with Speed Effect */
    #web-splash-logo {
      width: 180px;
      height: auto;
      margin-bottom: 60px;
      animation: logoFadeIn 0.8s ease-out, speeder 0.4s linear infinite;
    }

    /* Stop animations when fading out to prevent visual glitches */
    #web-splash.fade-out #web-splash-logo {
      animation: none !important;
      transform: none !important;
    }

    @keyframes logoFadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Speed Effect Animation */
    @keyframes speeder {
      0% { transform: translate(2px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -3px) rotate(-1deg); }
      20% { transform: translate(-2px, 0px) rotate(1deg); }
      30% { transform: translate(1px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 3px) rotate(-1deg); }
      60% { transform: translate(-1px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-2px, -1px) rotate(1deg); }
      90% { transform: translate(2px, 1px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }

    .longfazers {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .longfazers span {
      position: absolute;
      height: 2px;
      width: 20%;
      background: #ffffff;
    }

    .longfazers span:nth-child(1) {
      top: 20%;
      animation: lf 0.6s linear infinite;
      animation-delay: -5s;
    }

    .longfazers span:nth-child(2) {
      top: 40%;
      animation: lf2 0.8s linear infinite;
      animation-delay: -1s;
    }

    .longfazers span:nth-child(3) {
      top: 60%;
      animation: lf3 0.6s linear infinite;
    }

    .longfazers span:nth-child(4) {
      top: 80%;
      animation: lf4 0.5s linear infinite;
      animation-delay: -3s;
    }

    @keyframes lf {
      0% { left: 200%; }
      100% { left: -200%; opacity: 0; }
    }

    @keyframes lf2 {
      0% { left: 200%; }
      100% { left: -200%; opacity: 0; }
    }

    @keyframes lf3 {
      0% { left: 200%; }
      100% { left: -100%; opacity: 0; }
    }

    @keyframes lf4 {
      0% { left: 200%; }
      100% { left: -100%; opacity: 0; }
    }

    #loading-text {
      position: absolute;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-weight: 300;
      font-size: 12px;
      text-transform: uppercase;
      color: #ffffff;
      letter-spacing: 3px;
      margin-top: 60px;
    }

    /* Hide splash when Flutter is ready */
    body.flutter-ready #web-splash {
      display: none;
    }
  </style>

  <!-- Web Splash Screen (shown while Flutter loads) -->
  <div id="web-splash">
    <img id="web-splash-logo" src="assets/assets/logos/pace-scheduler-logo-w.svg" alt="Pace Scheduler">

    <!-- Speed Lines -->
    <div class="longfazers">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <h1 id="loading-text">Loading</h1>
  </div>

  <script>
    // Remove splash when Flutter first frame is rendered (faster loading)
    window.addEventListener('flutter-first-frame', function() {
      console.log('[Splash] Flutter first frame rendered, removing splash');
      const splash = document.getElementById('web-splash');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(() => {
          document.body.classList.add('flutter-ready');
          console.log('[Splash] Splash screen removed');
        }, 500);
      }
    });
  </script>
  <!-- Viewer Manager (defer, loads after Babylon.js) -->

  <!-- Verify 3D dependencies when page is fully loaded (non-blocking) -->
  <script defer>
    // Wait for window load to check 3D dependencies (completely non-blocking)
    window.addEventListener('load', function() {
      // Give deferred scripts time to execute
      setTimeout(function() {
        const babylonLoaded = typeof BABYLON !== 'undefined';
        const viewerManagerLoaded = typeof window.viewerManager !== 'undefined';
        const deviceViewerLoaded = typeof DeviceViewer !== 'undefined';
        const globeViewerLoaded = typeof GlobeViewer !== 'undefined';

        if (babylonLoaded && viewerManagerLoaded && deviceViewerLoaded && globeViewerLoaded) {
          console.log('[Pace] All 3D viewers ready');
        }
        // Silently continue if not loaded - they will load when needed
      }, 2000);
    });
  </script>

  <!-- Flutter App -->
  <script src="flutter_bootstrap.js" async></script>
