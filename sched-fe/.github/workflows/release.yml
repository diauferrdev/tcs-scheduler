name: Build and Release

# ========================================
# Automated Desktop Release Workflow
# TCS PacePort Scheduler
# ========================================
#
# TRIGGER:
#   Push a version tag to trigger this workflow:
#     git tag v1.0.0
#     git push --tags
#
# WHAT THIS WORKFLOW DOES:
#   1. Detects version tag (v*.*.*)
#   2. Builds all desktop platforms in parallel:
#      - Windows: .exe + .msix (GitHub Releases)
#      - Linux: AppImage + tar.gz + Flatpak + Snap (GitHub Releases)
#      - macOS: DMG/ZIP (when build config available)
#   3. Creates GitHub Release with the version tag
#   4. Uploads all build artifacts to release
#   5. Generates release notes from commit messages
#
# REQUIREMENTS:
#   - Repository secrets configured (if needed for signing)
#   - Flutter SDK installed on GitHub runners
#   - Tag must match pattern: v*.*.*
#
# MOBILE BUILDS (Separate from this workflow):
#   - Android: Use scripts/build/android.sh → Firebase App Distribution
#   - iOS: Use scripts/build/ios.sh → Firebase App Distribution
#
# ========================================

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ========================================
  # WINDOWS BUILD JOB
  # ========================================
  # Builds Windows .exe and .msix for GitHub Releases
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows executable
        run: flutter build windows --release

      - name: Create Windows ZIP archive
        shell: bash
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip "../../tcs-pace-scheduler-v${{ steps.version.outputs.VERSION }}-windows-x64.zip" ./*

      # Note: MSIX generation requires signing certificate
      # Uncomment when certificate is available:
      # - name: Build MSIX package
      #   run: flutter pub run msix:create

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/windows/tcs-pace-scheduler-v${{ steps.version.outputs.VERSION }}-windows-x64.zip

  # ========================================
  # LINUX BUILD JOB
  # ========================================
  # Builds Linux AppImage, tar.gz, and generates Flatpak/Snap configs
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev \
            liblzma-dev libnotify-dev libnotify4 wget

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux binary
        run: flutter build linux --release

      - name: Create tar.gz archive
        run: |
          cd build/linux/x64/release
          tar -czf "tcs-pace-scheduler-v${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz" bundle/

      - name: Build AppImage
        run: |
          # Create AppDir structure
          APPDIR="build/linux/TCS-Pace-Scheduler.AppDir"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/512x512/apps"

          # Copy application files
          cp -r build/linux/x64/release/bundle/* "$APPDIR/usr/bin/"
          cp linux/com.tcs.pace_scheduler.desktop "$APPDIR/usr/share/applications/"
          cp linux/icons/hicolor/512x512/apps/com.tcs.pace_scheduler.png "$APPDIR/usr/share/icons/hicolor/512x512/apps/"

          # Create AppRun launcher
          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          cd "${HERE}/usr/bin"
          exec "${HERE}/usr/bin/tcs_pace_scheduler" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          # Copy desktop and icon to AppDir root
          cp linux/com.tcs.pace_scheduler.desktop "$APPDIR/"
          cp linux/icons/hicolor/512x512/apps/com.tcs.pace_scheduler.png "$APPDIR/"

          # Fix desktop file categories
          sed -i 's/Categories=Office;Productivity;/Categories=Office;/' "$APPDIR/com.tcs.pace_scheduler.desktop"

          # Download and extract appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O build/appimagetool-x86_64.AppImage
          chmod +x build/appimagetool-x86_64.AppImage
          cd build
          ./appimagetool-x86_64.AppImage --appimage-extract > /dev/null 2>&1
          cd ..

          # Build AppImage
          ARCH=x86_64 ./build/squashfs-root/AppRun "$APPDIR" "build/linux/x64/release/TCS-Pace-Scheduler-v${{ steps.version.outputs.VERSION }}-x86_64.AppImage"
          chmod +x "build/linux/x64/release/TCS-Pace-Scheduler-v${{ steps.version.outputs.VERSION }}-x86_64.AppImage"

      - name: Generate Flatpak manifest
        run: |
          mkdir -p build/linux/flatpak
          cat > build/linux/flatpak/com.tcs.pace_scheduler.yml << EOF
          app-id: com.tcs.pace_scheduler
          runtime: org.freedesktop.Platform
          runtime-version: '23.08'
          sdk: org.freedesktop.Sdk
          command: tcs_pace_scheduler

          finish-args:
            - --share=ipc
            - --socket=x11
            - --socket=wayland
            - --device=dri
            - --share=network
            - --filesystem=home

          modules:
            - name: tcs-pace-scheduler
              buildsystem: simple
              build-commands:
                - install -D tcs_pace_scheduler /app/bin/tcs_pace_scheduler
                - install -D com.tcs.pace_scheduler.desktop /app/share/applications/com.tcs.pace_scheduler.desktop
                - install -D com.tcs.pace_scheduler.png /app/share/icons/hicolor/512x512/apps/com.tcs.pace_scheduler.png
              sources:
                - type: dir
                  path: ../../x64/release/bundle
          EOF

          # Copy required files
          cp build/linux/x64/release/bundle/tcs_pace_scheduler build/linux/flatpak/
          cp linux/com.tcs.pace_scheduler.desktop build/linux/flatpak/
          cp linux/icons/hicolor/512x512/apps/com.tcs.pace_scheduler.png build/linux/flatpak/

      - name: Generate Snap configuration
        run: |
          mkdir -p snap
          cat > snap/snapcraft.yaml << EOF
          name: tcs-pace-scheduler
          version: '${{ steps.version.outputs.VERSION }}'
          summary: TCS Pace Scheduler
          description: |
            Enterprise scheduling application for TCS PacePort office visits.

            Features:
            - Role-based access control
            - Automated booking management
            - Real-time notifications
            - Calendar integration

          grade: stable
          confinement: strict
          base: core22

          apps:
            tcs-pace-scheduler:
              command: tcs_pace_scheduler
              plugs:
                - network
                - network-bind
                - desktop
                - desktop-legacy
                - wayland
                - x11
                - opengl
                - home

          parts:
            tcs-pace-scheduler:
              plugin: dump
              source: build/linux/x64/release/bundle
              organize:
                '*': bin/
              stage-packages:
                - libgtk-3-0
                - libglib2.0-0
                - libnotify4
          EOF

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/linux/x64/release/tcs-pace-scheduler-v${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
            build/linux/x64/release/TCS-Pace-Scheduler-v${{ steps.version.outputs.VERSION }}-x86_64.AppImage
            build/linux/flatpak/com.tcs.pace_scheduler.yml
            snap/snapcraft.yaml

  # ========================================
  # MACOS BUILD JOB (Placeholder)
  # ========================================
  # Uncomment when macOS build configuration is ready
  # build-macos:
  #   name: Build macOS
  #   runs-on: macos-latest
  #
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: Setup Flutter
  #       uses: subosito/flutter-action@v2
  #       with:
  #         channel: stable
  #         cache: true
  #
  #     - name: Get version from tag
  #       id: version
  #       run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
