  #       run: flutter pub get
  #
  #     - name: Build macOS app
  #       run: flutter build macos --release
  #
  #     - name: Create DMG or ZIP
  #       run: |
  #         cd build/macos/Build/Products/Release
  #         zip -r "tcs-pace-scheduler-v${{ steps.version.outputs.VERSION }}-macos.zip" "tcs_pace_scheduler.app"
  #
  #     - name: Upload macOS artifacts
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: macos-build
  #         path: build/macos/Build/Products/Release/tcs-pace-scheduler-v${{ steps.version.outputs.VERSION }}-macos.zip

  # ========================================
  # CREATE GITHUB RELEASE
  # ========================================
  # Collects all build artifacts and creates a GitHub Release
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    # Add build-macos to needs when ready: needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-artifacts/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release-artifacts/

      # Uncomment when macOS build is ready:
      # - name: Download macOS artifacts
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: macos-build
      #     path: release-artifacts/

      - name: Generate release notes
        id: release_notes
        run: |
          # Source the release notes helper
          source scripts/lib/get-release-notes.sh

          # Get release notes from RELEASE_NOTES.md
          NOTES=$(get_release_notes)

          # Create release notes
          cat > release_notes.md << EOF
          ## TCS Pace Scheduler v${{ steps.version.outputs.VERSION }}

          ### 📦 Available Downloads

          #### Windows
          - **tcs-pace-scheduler-v${{ steps.version.outputs.VERSION }}-windows-x64.zip** - Portable application (extract and run)

          #### Linux
          - **TCS-Pace-Scheduler-v${{ steps.version.outputs.VERSION }}-x86_64.AppImage** - Universal executable (recommended)
          - **tcs-pace-scheduler-v${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz** - Compressed archive
          - **com.tcs.pace_scheduler.yml** - Flatpak manifest for Flathub
          - **snapcraft.yaml** - Snap configuration for Ubuntu Store

          ### 📱 Mobile Builds
          Android and iOS builds are distributed via **Firebase App Distribution**.

          ### 📝 Release Notes
          ${NOTES}

          ---

          ### 🚀 Installation Instructions

          **Windows:**
          1. Download the ZIP file
          2. Extract to any folder
          3. Run \`flutter_multiplatform_app.exe\`

          **Linux (AppImage):**
          1. Download the AppImage file
          2. Make executable: \`chmod +x TCS-Pace-Scheduler-*.AppImage\`
          3. Run: \`./TCS-Pace-Scheduler-*.AppImage\`

          **Linux (tar.gz):**
          1. Download and extract: \`tar -xzf tcs-pace-scheduler-*.tar.gz\`
          2. Navigate: \`cd bundle\`
          3. Run: \`./tcs_pace_scheduler\`

          🤖 Generated with automated release workflow
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
