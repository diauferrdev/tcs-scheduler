name: sched_fe
description: "TCS Pace Scheduler - Enterprise scheduling application for office visits"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.1.16+56

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^15.1.0

  # HTTP & API
  http: ^1.2.2
  web_socket_channel: ^3.0.3
  universal_html: ^2.2.4

  # Real-time sync with backend Colyseus server
  # Using standard WebSocket + JSON for compatibility

  # Local Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.0.0

  # Utils
  intl: ^0.20.0
  path: ^1.9.0
  table_calendar: ^3.1.2

  # Charts
  fl_chart: ^0.70.1
  syncfusion_flutter_charts: ^28.1.33
  syncfusion_flutter_gauges: ^28.1.33

  # QR Code & Sharing
  qr_flutter: ^4.1.0
  share_plus: ^12.0.0
  url_launcher: ^6.3.2

  # PDF Generation & Printing
  pdf: ^3.11.1
  printing: ^5.13.4

  # Permissions
  permission_handler: ^12.0.1

  # File & Image Handling
  image_picker: ^1.0.7
  file_picker: ^8.1.4
  photo_view: ^0.15.0
  open_file: ^3.3.2
  path_provider: ^2.1.2
  video_player: ^2.9.2
  chewie: ^1.8.5

  # Local Notifications
  flutter_local_notifications: ^18.0.1
  local_notifier: ^0.1.6
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2
  package_info_plus: ^9.0.0
  device_info_plus: ^11.2.0
  firebase_app_check: ^0.4.1
  add_2_calendar: ^3.0.1
  window_manager: ^0.5.1
  msix: ^3.16.12
  cached_network_image: ^3.4.1
  visibility_detector: ^0.4.0+2

  # Splash Screen
  splash_master: ^0.0.3
  lottie: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  image_path: "assets/icons/android/play_store_512.png"
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/icons/android/play_store_512.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icons/android/play_store_512.png"
  web:
    generate: true
    image_path: "assets/icons/android/play_store_512.png"
    background_color: "#000000"
    theme_color: "#000000"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# Splash Screen Configuration for splash_master
splash_master:
  color: '#000000'  # Black background
  image: 'assets/splash/tcs_logo_static.png'
  ios_content_mode: 'center'
  android_gravity: 'center'
  color_dark_android: '#000000'
  android_12_and_above:
    color: '#000000'
    image: 'assets/splash/tcs_logo_static.png'

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/logos/
    - assets/icons/
    - assets/splash/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Custom TCS Brand Fonts
  fonts:
    - family: HouschkaRoundedAlt
      fonts:
        - asset: assets/fonts/HouschkaRoundedAlt-Light.ttf
          weight: 300
        - asset: assets/fonts/HouschkaRoundedAlt-Medium.ttf
          weight: 500
    - family: BasisGrotesquePro
      fonts:
        - asset: assets/fonts/BasisGrotesqueArabicPro-Light.ttf
          weight: 300
        - asset: assets/fonts/BasisGrotesqueArabicPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/BasisGrotesqueArabicPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/BasisGrotesqueArabicPro-Bold.ttf
          weight: 700

# Microsoft Store (MSIX) Configuration
msix_config:
  display_name: TCS Pace Scheduler
  publisher_display_name: TCS
  identity_name: TCS.PaceScheduler
  msix_version: 1.0.4.0
  logo_path: windows\runner\resources\app_icon.ico
  capabilities: internetClient
  publisher: CN=TCS
  languages: en-us, pt-br
  description: Enterprise scheduling application for TCS Pace office visits
  architecture: x64
  certificate_path: tcs_certificate.pfx
  certificate_password: Tata@123
  install_certificate: false
