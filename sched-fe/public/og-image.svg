<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gradient)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="300" fill="#FFFFFF" opacity="0.03"/>
  <circle cx="1100" cy="530" r="250" fill="#FFFFFF" opacity="0.03"/>

  <!-- Main content -->
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF">
    TCS PACEPORT
  </text>

  <text x="100" y="260" font-family="Arial, sans-serif" font-size="32" fill="#CCCCCC">
    Scheduler
  </text>

  <!-- Description -->
  <text x="100" y="350" font-family="Arial, sans-serif" font-size="28" fill="#999999">
    Schedule your visit to TCS PacePort São Paulo
  </text>

  <text x="100" y="400" font-family="Arial, sans-serif" font-size="24" fill="#666666">
    Enterprise scheduling system with digital access badges
  </text>

  <!-- Bottom accent -->
  <rect x="100" y="480" width="400" height="4" fill="#FFFFFF"/>

  <text x="100" y="540" font-family="Arial, sans-serif" font-size="20" fill="#666666">
    Innovation Center • São Paulo, Brazil
  </text>
</svg>
